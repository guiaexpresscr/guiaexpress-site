<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Email confirmado — GuíaExpress CR</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      background: #f4f7fb;
      color: #1a2e3b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,48,87,.08);
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; font-weight: 800; color: #0f2b3c; margin-bottom: 8px; }
    h1 span { color: #4db284; }
    p { font-size: 14px; color: #6b7d8a; line-height: 1.6; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #309da2, #6fca60);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Guia<span>Express</span> CR</h1>
    <p>Tu correo electrónico ha sido verificado correctamente.</p>
    <p>Volvé a la extensión y hacé click en <strong>"Ya verifiqué mi correo"</strong> para continuar.</p>
    <a href="https://guiaexpresscr.com" class="btn">Ir a GuíaExpress</a>
  </div>
</body>
</html>
